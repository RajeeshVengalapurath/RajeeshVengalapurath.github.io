<!DOCTYPE html>

<head>

  <title>Rajeesh Vengalapurath</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400&family=Open+Sans:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
      text-align: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .profile-photo {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
    }

    h1 {
      margin: 0;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 400;
      font-size: 3rem;
      padding-inline: 0.6em;
      color: black;
    }

    .description {
      margin: 0;
      font-family: 'Open Sans', sans-serif;
      font-size: 1.25rem;
      padding-inline: 0.6em;
      color: #333;
    }

    .social-link {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .social-link svg {
      width: 34px;
      height: 34px;
      fill: black;
      transition: 0.2s ease;
    }

    .social-link:hover svg {
      transform: scale(1.1);
    }
    .project-btn {
    display: inline-block;
    padding: 12px 32px;
    font-family: 'Open Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: black;
    text-decoration: none;
    border: 1.5px solid black;
    border-radius: 999px;
    transition: all 0.25s ease;
    background: transparent;
  }

  .project-btn:hover {
    background: black;
    color: white;
    transform: translateY(-2px);
  }
  </style>
</head>

<body>

  <div class="container">

    <!-- Description -->
    <p class="description">Software Engineer specializing in Microsoft Technologies

</p>

<a href="https://rajeeshvengalapurath.github.io/erp" class="project-btn">
